# Manual test only — Actions → this workflow → Run workflow
name: Test email now

on:
  workflow_dispatch:

jobs:
  test-send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Restore monitor state
        uses: actions/cache@v4
        with:
          path: monitor_state.json
          key: xndu-ceo-monitor-state-v1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - name: Send test email
        id: email
        env:
          FORCE_SEND: "true"
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          SEC_USER_AGENT: ${{ secrets.SEC_USER_AGENT }}
        run: |
          echo "Toronto time: $(TZ=America/Toronto date '+%Y-%m-%d %H:%M %Z')"
          python send_daily_email.py | tee email.log
          grep -q "Email sent" email.log && echo "email_sent=true" >> "$GITHUB_OUTPUT"

      - name: Save monitor state
        if: steps.email.outputs.email_sent == 'true'
        uses: actions/cache/save@v4
        with:
          path: monitor_state.json
          key: xndu-ceo-monitor-state-v1
