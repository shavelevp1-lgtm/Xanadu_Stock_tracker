name: Daily XNDU stock email

on:
  schedule:
    # GitHub free-tier cron is often ~14h late. These fire the night before so
    # the delayed run lands ~9 AM Toronto (13:00 UTC EDT / 14:00 UTC EST).
    - cron: "0 23 * * 0-4"
    - cron: "0 0 * * 1-5"
  workflow_dispatch:

jobs:
  send-email:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify required secrets
        env:
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          SEC_USER_AGENT: ${{ secrets.SEC_USER_AGENT }}
        run: |
          missing=0
          for name in SMTP_USER SMTP_PASSWORD EMAIL_TO SEC_USER_AGENT; do
            val="${!name}"
            if [ -z "$val" ]; then
              echo "::error::Repository secret '$name' is missing or empty."
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi
          echo "Required secrets are set."

      - name: Restore monitor state
        uses: actions/cache@v4
        with:
          path: monitor_state.json
          key: xndu-ceo-monitor-state-v1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Send daily stock and insider email
        id: email
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          SEC_USER_AGENT: ${{ secrets.SEC_USER_AGENT }}
        run: |
          echo "Event: ${{ github.event_name }}"
          echo "Toronto time: $(TZ=America/Toronto date '+%Y-%m-%d %H:%M %Z')"
          python send_daily_email.py | tee email.log
          if grep -q "Email skipped" email.log; then
            echo "::warning::No email was sent this run. See log above."
          fi
          if grep -q "Email sent" email.log; then
            echo "email_sent=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Save monitor state
        if: always() && steps.email.outputs.email_sent == 'true'
        uses: actions/cache/save@v4
        with:
          path: monitor_state.json
          key: xndu-ceo-monitor-state-v1
