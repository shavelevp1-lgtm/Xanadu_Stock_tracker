name: Daily XNDU stock email

on:
  schedule:
    # Two UTC slots cover 9 AM Toronto in EDT (13 UTC) and EST (14 UTC).
    # GitHub cron can be delayed; Python sends once per Toronto day in an 8–10 AM window.
    - cron: "0 13 * * 1-5"
    - cron: "0 14 * * 1-5"
  workflow_dispatch:

jobs:
  send-email:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify required secrets
        env:
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          SEC_USER_AGENT: ${{ secrets.SEC_USER_AGENT }}
        run: |
          missing=0
          for name in SMTP_USER SMTP_PASSWORD EMAIL_TO SEC_USER_AGENT; do
            val="${!name}"
            if [ -z "$val" ]; then
              echo "::error::Repository secret '$name' is missing or empty."
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi
          echo "Required secrets are set."

      - name: Restore monitor state
        uses: actions/cache@v4
        with:
          path: monitor_state.json
          key: xndu-ceo-monitor-state-v1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Send daily stock and insider email
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          SEC_USER_AGENT: ${{ secrets.SEC_USER_AGENT }}
        run: python send_daily_email.py
